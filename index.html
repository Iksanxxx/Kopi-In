<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopi In</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#4b2e2e;
    color:white;
    text-align:center;
    padding:20px;
}

.produk{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    width:250px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

button{
    width:100%;
    padding:10px;
    background:#4b2e2e;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#6b3e3e;
}

.troli{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.item-troli{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

footer{
    text-align:center;
    background:#4b2e2e;
    color:white;
    padding:15px;
}
</style>
</head>

<body>

<header>
    <h1>☕ Kopi In</h1>
    <p>Di Kopi In dulu, urusan lain gimana nanti 🔥</p>
</header>

<section class="produk">

<div class="card">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <div class="card-content">
        <h3>Kopi Susu</h3>
        <p>Rp5.000</p>
        <button onclick="pesan('Kopi Susu',5000)">
            Pesan
        </button>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
    <div class="card-content">
        <h3>Americano</h3>
        <p>Rp10.000</p>
        <button onclick="pesan('Americano',10000)">
            Pesan
        </button>
    </div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
    <div class="card-content">
        <h3>Vanila Latte</h3>
        <p>Rp20.000</p>
        <button onclick="pesan('Vanila Latte',20000)">
            Pesan
        </button>
    </div>
</div>

</section>

<div class="troli">
    <h2>🛒 Troli</h2>

    <div id="daftarTroli">
        <p>Belum ada pesanan</p>
    </div>

    <h3 id="totalHarga">
        Total: Rp0
    </h3>

    <button onclick="checkout()">
        Checkout WhatsApp
    </button>
</div>

<footer>
    Customer Service: 085716574008
</footer>

<script>
let troli = [];

function pesan(nama,harga){

    troli.push({
        nama:nama,
        harga:harga
    });

    updateTroli();
}

function updateTroli(){

    let daftar =
    document.getElementById("daftarTroli");

    let total = 0;

    daftar.innerHTML = "";

    troli.forEach((item,index)=>{

        total += item.harga;

        daftar.innerHTML += `
        <div class="item-troli">
            <span>
            ${item.nama} -
            Rp${item.harga.toLocaleString()}
            </span>

            <button
            style="width:auto;padding:5px 10px"
            onclick="hapus(${index})">
            ❌
            </button>
        </div>
        `;
    });

    if(troli.length===0){
        daftar.innerHTML =
        "<p>Belum ada pesanan</p>";
    }

    document.getElementById("totalHarga")
    .innerHTML =
    "Total: Rp" +
    total.toLocaleString();
}

function hapus(index){

    troli.splice(index,1);

    updateTroli();
}

function checkout(){

    if(troli.length===0){
        alert("Troli masih kosong");
        return;
    }

    let text =
    "Halo, saya ingin memesan:%0A";

    troli.forEach(item=>{
        text +=
        "- " + item.nama +
        " (Rp" +
        item.harga.toLocaleString() +
        ")%0A";
    });

    let total = troli.reduce(
    (a,b)=>a+b.harga,0);

    text +=
    "%0ATotal: Rp" +
    total.toLocaleString();

    window.open(
    "https://wa.me/6285716574008?text="+text,
    "_blank"
    );
}
</script>

</body>
</html>
